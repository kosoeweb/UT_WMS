<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UT - Transactions</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <style>
    body { background-color: #f4f6f9; font-family: sans-serif; }
    .navbar { background: #1e3a8a !important; }
    .card { border: none; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .navbar-brand { line-height: 1.2; }
    .table th { background-color: #212529; color: white; }
    .edit-mode-active { background-color: #fff3cd !important; border-color: #ffc107 !important; }
  </style>
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark mb-4">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold text-white text-decoration-none d-flex align-items-center" href="#">
        <img src="https://zdifzvpjmmmsfitjsraw.supabase.co/storage/v1/object/sign/Logo/UT%20Logo.png?token=eyJraWQiOiJzdG9yYWdlLXVybC1zaWduaW5nLWtleV84MjVmNmZkNy1mZTM3LTQzNWItOWFhMi1jZGQ4ZjY5NWM0NGYiLCJhbGciOiJIUzI1NiJ9.eyJ1cmwiOiJMb2dvL1VUIExvZ28ucG5nIiwiaWF0IjoxNzc2MTYxNTMyLCJleHAiOjIwOTE1MjE1MzJ9.m1SFbDusZJ0EIqrDjog_Pok2FMzYGtVhV0hmrogL-3Q" alt="UT Logo" style="height: 45px; margin-right: 15px; border-radius: 6px;">
        <div style="line-height: 1.2;">
          Universal Tractor Co., Ltd.<br>
          <small style="font-size: 0.8rem; font-weight: 400; letter-spacing: 0.5px;">Warehouse Management System</small>
        </div>
      </a>
      <div>
        <a href="index.html" class="btn btn-outline-light btn-sm mx-1">Master Data</a>
        <a href="transaction.html" class="btn btn-light btn-sm mx-1">Transactions</a>
        <a href="dashboard.html" class="btn btn-outline-light btn-sm mx-1">Dashboard</a>
      </div>
    </div>
  </nav>

  <div class="container-fluid px-4">
    <div class="card p-4 border-top border-primary border-4" id="mainCard">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="m-0 text-primary" id="formTitle">Stock In/Out Transaction</h4>
        <div class="form-check form-switch fs-5">
          <input class="form-check-input" type="checkbox" id="editToggle" onchange="toggleEditMode()">
          <label class="form-check-label fw-bold text-warning" for="editToggle">Enable Edit Mode</label>
        </div>
      </div>
      
      <div class="row mb-4 bg-light p-3 rounded g-3" id="topControls">
        <div class="col-md-3">
          <label class="fw-bold">Transaction Type</label>
          <select id="txnType" class="form-select border-success fw-bold text-success" onchange="toggleTypeStyle(this)">
            <option value="IN">STOCK IN (+)</option>
            <option value="OUT" class="text-danger">STOCK OUT (-)</option>
          </select>
        </div>
        <div class="col-md-3">
          <label class="fw-bold text-dark">Transaction ID</label>
          <input type="text" id="txnId" class="form-control" placeholder="e.g. TXN-001">
          <select id="editTxnIdSelect" class="form-select border-warning" style="display:none;" onchange="loadTxnData()">
            <option value="">Select Txn ID...</option>
          </select>
        </div>
        <div class="col-md-6">
          <label class="fw-bold">Global Remark</label>
          <textarea id="txnGlobalRemark" class="form-control" rows="1" placeholder="PO Number, Supplier Name, etc."></textarea>
        </div>
      </div>

      <datalist id="itemsDataList"></datalist>

      <div class="table-responsive">
        <table class="table table-bordered align-middle text-center">
          <thead>
            <tr>
              <th width="20%">Item (Type/Select)</th>
              <th width="20%">Location</th>
              <th width="10%">Balance</th>
              <th width="10%">Qty</th>
              <th width="30%">Line Remark</th>
              <th width="10%">Action</th>
            </tr>
          </thead>
          <tbody id="txnBody"></tbody>
          <tfoot>
            <tr class="table-light">
              <td colspan="3" class="text-end fw-bold">Total Input Quantity:</td>
              <td id="entryTotalQty" class="fw-bold text-primary fs-5">0</td>
              <td colspan="2"></td>
            </tr>
          </tfoot>
        </table>
      </div>
      
      <div class="mt-3">
        <button class="btn btn-secondary btn-sm" onclick="addRow()">+ Add Row</button>
        <button class="btn btn-primary float-end px-5 fw-bold" onclick="submitTxn()" id="btnSubmit">Submit Transaction</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="supabase-config.js"></script>
  <script src="auth-wms.js"></script>

  <script>
    let optionsLoc = '';
    let isEditMode = false;
    let originalTxnId = '';
    let originalDateStr = '';
    let validItemCodes = [];

    window.onload = async function() {
      // ✅ FIX: Load all items, then filter out explicitly 'Inactive' ones
      const { data: allItems } = await supabase.from('wms_items').select('code, name, status');
      if (allItems) {
        let items = allItems.filter(i => i.status !== 'Inactive'); // Handles null/blank successfully
        validItemCodes = items.map(i => String(i.code).trim().toUpperCase());
        let listHTML = items.map(i => `<option value="${i.code}">${i.name}</option>`).join('');
        document.getElementById('itemsDataList').innerHTML = listHTML;
      }
      
      const { data: locs } = await supabase.from('wms_locations').select('main, sub');
      if (locs) {
        optionsLoc = locs.map(l => `<option value="${l.main} - ${l.sub}">${l.main} - ${l.sub}</option>`).join('');
      }

      checkInit();
    }

    function checkInit() {
      if(document.getElementById('itemsDataList').innerHTML !== '' && optionsLoc !== '' && document.getElementById('txnBody').innerHTML === '') {
        addRow();
      }
    }

    function toggleTypeStyle(selectEl) {
      if(selectEl.value === 'OUT') {
        selectEl.classList.remove('border-success', 'text-success');
        selectEl.classList.add('border-danger', 'text-danger');
      } else {
        selectEl.classList.remove('border-danger', 'text-danger');
        selectEl.classList.add('border-success', 'text-success');
      }
    }

    async function toggleEditMode() {
      isEditMode = document.getElementById('editToggle').checked;
      let card = document.getElementById('mainCard');
      let btnSubmit = document.getElementById('btnSubmit');
      let title = document.getElementById('formTitle');
      let createInput = document.getElementById('txnId');
      let editSelect = document.getElementById('editTxnIdSelect');

      if(isEditMode) {
        card.classList.add('edit-mode-active');
        btnSubmit.innerText = 'Update Transaction';
        btnSubmit.classList.replace('btn-primary', 'btn-warning');
        title.innerText = "Edit Existing Transaction";
        title.classList.replace('text-primary', 'text-warning');
        
        createInput.style.display = 'none'; editSelect.style.display = 'block';
        editSelect.innerHTML = '<option value="">Loading IDs...</option>';
        
        const { data } = await supabase.from('wms_transactions').select('txn_id').order('id', { ascending: false });
        if(data) {
          let uniqueIds = [...new Set(data.map(d => d.txn_id))];
          let opts = '<option value="">-- Select Transaction ID --</option>';
          uniqueIds.forEach(id => { opts += `<option value="${id}">${id}</option>`; });
          editSelect.innerHTML = opts;
        }

      } else {
        card.classList.remove('edit-mode-active');
        btnSubmit.innerText = 'Submit Transaction';
        btnSubmit.classList.replace('btn-warning', 'btn-primary');
        title.innerText = "Stock In/Out Transaction";
        title.classList.replace('text-warning', 'text-primary');
        
        createInput.style.display = 'block'; editSelect.style.display = 'none';
        originalTxnId = ''; originalDateStr = ''; createInput.value = '';
        document.getElementById('txnGlobalRemark').value = '';
        document.getElementById('txnBody').innerHTML = '';
        addRow(); calculateEntryTotal();
      }
    }

    async function loadTxnData() {
      let tId = document.getElementById('editTxnIdSelect').value;
      if(!tId) return; 
      Swal.fire({ title: 'Loading...', allowOutsideClick: false, didOpen: () => { Swal.showLoading() } });
      
      const { data, error } = await supabase.from('wms_transactions').select('*').eq('txn_id', tId);
      if(error || !data || data.length === 0) return Swal.fire('Error', 'Data rendering failed.', 'error');

      let firstRow = data[0];
      document.getElementById('txnType').value = firstRow.type;
      toggleTypeStyle(document.getElementById('txnType'));
      document.getElementById('txnGlobalRemark').value = firstRow.globalremark || '';
      originalTxnId = firstRow.txn_id; 
      originalDateStr = firstRow.date_str; 
      
      document.getElementById('txnBody').innerHTML = '';
      data.forEach(r => { addRow(r.item, r.location, r.qty, r.lineremark || ''); });
      
      calculateEntryTotal();
      Swal.close();
    }

    function addRow(itemVal = '', locVal = '', qtyVal = '', remarkVal = '') {
      const tr = document.createElement('tr');
      tr.dataset.balance = 0; 
      tr.innerHTML = `
        <td><input list="itemsDataList" class="form-control item-sel" placeholder="Item Code..." value="${itemVal}" onchange="triggerCheck(this)"></td>
        <td><select class="form-select loc-sel" onchange="triggerCheck(this)"><option value="">Select Location...</option>${optionsLoc}</select></td>
        <td class="bal-cell"><span class="badge bg-secondary fs-6">-</span></td>
        <td><input type="number" class="form-control qty-val" min="1" value="${qtyVal}" oninput="calculateEntryTotal()"></td>
        <td><input type="text" class="form-control remark-val" placeholder="Remark..." value="${remarkVal}"></td>
        <td><button class="btn btn-danger btn-sm" onclick="this.parentElement.parentElement.remove(); calculateEntryTotal();">Remove</button></td>
      `;
      document.getElementById('txnBody').appendChild(tr);
      if(locVal) { tr.querySelector('.loc-sel').value = locVal; }
      if(itemVal && locVal) { triggerCheck(tr.querySelector('.item-sel')); }
      calculateEntryTotal();
    }

    function calculateEntryTotal() {
      let total = 0;
      document.querySelectorAll('.qty-val').forEach(input => {
        let val = Number(input.value);
        if(!isNaN(val)) total += val;
      });
      document.getElementById('entryTotalQty').innerText = total;
    }

    async function triggerCheck(element) {
      let row = element.closest('tr');
      let itemCode = row.querySelector('.item-sel').value.trim().toUpperCase();
      let loc = row.querySelector('.loc-sel').value;
      let balCell = row.querySelector('.bal-cell');
      
      if(itemCode && loc) {
        if(!validItemCodes.includes(itemCode)) {
           balCell.innerHTML = '<span class="badge bg-danger fs-6">Invalid Item</span>';
           row.dataset.balance = 0; return;
        }
          
        balCell.innerHTML = '<div class="spinner-border spinner-border-sm text-primary" role="status"></div>';
        let excludeId = (isEditMode && originalTxnId !== '') ? originalTxnId : '';
        
        const { data: txns } = await supabase.from('wms_transactions').select('txn_id, type, qty').eq('item', itemCode).eq('location', loc);
          
        let bal = 0;
        if(txns) {
          txns.forEach(t => {
            if(excludeId && t.txn_id === excludeId) return; 
            if(t.type === 'IN') bal += t.qty;
            if(t.type === 'OUT') bal -= t.qty;
          });
        }

        let colorClass = bal > 0 ? 'bg-success' : 'bg-danger';
        balCell.innerHTML = `<span class="badge ${colorClass} fs-6">${bal}</span>`;
        row.dataset.balance = bal;

      } else {
        balCell.innerHTML = '<span class="badge bg-secondary fs-6">-</span>';
        row.dataset.balance = 0;
      }
    }

    async function submitTxn() {
      const type = document.getElementById('txnType').value;
      const txnId = isEditMode ? document.getElementById('editTxnIdSelect').value.trim() : document.getElementById('txnId').value.trim();
      const globalRemark = document.getElementById('txnGlobalRemark').value;
      
      if(!txnId) return Swal.fire('Warning', 'Transaction ID is required.', 'warning');
      if(isEditMode && originalTxnId === '') return Swal.fire('Warning', 'Please load an existing transaction first.', 'warning');

      const rows = document.querySelectorAll('#txnBody tr');
      let rowData = []; let formTotals = {}; 

      for(let row of rows) {
        let item = row.querySelector('.item-sel').value.trim(); 
        let loc = row.querySelector('.loc-sel').value;
        let qty = Number(row.querySelector('.qty-val').value); 
        let lineRemark = row.querySelector('.remark-val').value;
        let availQty = Number(row.dataset.balance) || 0;
        
        if(!item || !loc || !qty) return Swal.fire('Warning', 'Please fill Item, Location, and Qty completely.', 'warning');
        
        if(!validItemCodes.includes(item.toUpperCase())) {
           return Swal.fire('Error', `Item Code "<b>${item}</b>" does not exist or is inactive!`, 'error');
        }
        
        let key = item + "|||" + loc;
        formTotals[key] = { req: (formTotals[key] ? formTotals[key].req + qty : qty), avail: availQty };
        
        rowData.push({
          date_str: isEditMode ? originalDateStr : new Date().toLocaleString('en-GB'),
          txn_id: txnId, type: type, item: item, location: loc, qty: qty, lineremark: lineRemark, globalremark: globalRemark
        });
      }

      if(rowData.length === 0) return Swal.fire('Warning', 'Add at least one item.', 'warning');

      if(type === 'OUT') {
        for(let key in formTotals) {
          if(formTotals[key].req > formTotals[key].avail) {
            let parts = key.split("|||");
            return Swal.fire('Rejected', `Insufficient stock for Item: <b>${parts[0]}</b> at Location: <b>${parts[1]}</b>.<br>Available: ${formTotals[key].avail}, Requested: ${formTotals[key].req}`, 'error');
          }
        }
      }

      let btnSubmit = document.getElementById('btnSubmit');
      btnSubmit.disabled = true; btnSubmit.innerText = isEditMode ? 'Updating...' : 'Submitting...';
      
      try {
        if(isEditMode) {
          const { error: delErr } = await supabase.from('wms_transactions').delete().eq('txn_id', originalTxnId);
          if(delErr) throw delErr;
        }

        const { error: insErr } = await supabase.from('wms_transactions').insert(rowData);
        if(insErr) throw insErr;

        Swal.fire('Success', 'Transaction saved successfully.', 'success');
        document.getElementById('txnBody').innerHTML = ''; addRow(); calculateEntryTotal();
        document.getElementById('txnId').value = ''; document.getElementById('txnGlobalRemark').value = '';
        
        if(isEditMode) { document.getElementById('editToggle').checked = false; toggleEditMode(); }
      } catch (err) {
        Swal.fire('Error', err.message, 'error');
      } finally {
        btnSubmit.disabled = false;
        btnSubmit.innerText = isEditMode ? 'Update Transaction' : 'Submit Transaction';
      }
    }
  </script>
</body>
</html>
